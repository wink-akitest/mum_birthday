<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今晚煮什麼</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <div class="header">
    <span class="floating-icon" style="top:10px;left:15px">🥢</span>
    <span class="floating-icon" style="top:20px;right:20px;animation-delay:0.5s">🍳</span>
    <span class="floating-icon" style="top:50px;left:40px;animation-delay:1s">🥬</span>
    <span class="floating-icon" style="top:45px;right:45px;animation-delay:1.5s">🍚</span>
    <h1>今晚煮什麼</h1>
    <p class="subtitle">計劃菜單 · 查看食譜 · 生成買菜清單</p>
  </div>

  <div class="container">
    <div class="section">
      <div class="section-title"><span class="icon">📋</span><span>今日菜單計劃</span></div>
      <div class="plan-grid">
        <div class="plan-slot" onclick="pickRandom('meat')">
          <div class="slot-icon">🥩</div><div class="slot-label">肉類</div>
          <div class="slot-dish" id="plan-meat">點擊隨機選擇</div>
        </div>
        <div class="plan-slot" onclick="pickRandom('veggie')">
          <div class="slot-icon">🥬</div><div class="slot-label">蔬菜</div>
          <div class="slot-dish" id="plan-veggie">點擊隨機選擇</div>
        </div>
        <div class="plan-slot" onclick="pickRandom('staple')">
          <div class="slot-icon">🍜</div><div class="slot-label">主食</div>
          <div class="slot-dish" id="plan-staple">點擊隨機選擇</div>
        </div>
        <div class="plan-slot" onclick="pickRandom('dessert')">
          <div class="slot-icon">🍮</div><div class="slot-label">甜品</div>
          <div class="slot-dish" id="plan-dessert">點擊隨機選擇</div>
        </div>
      </div>
      <button class="btn-random-all" onclick="randomAll()"><span>🎲</span> 一鍵隨機配餐</button>
      <button class="btn-shopping" onclick="generateShoppingList()"><span>🛒</span> 生成買菜清單</button>
    </div>

    <div class="section daughter-section">
      <div class="daughter-avatar">👧</div>
      <div class="daughter-bubble" id="daughterBubble">今天想煮什麼？點點上面的格子，我幫你挑～</div>
    </div>

    <div class="section">
      <div class="section-title"><span class="icon">📖</span><span>菜式食譜庫</span></div>
      <div class="category-tabs">
        <button class="tab-btn active" onclick="switchTab('meat',this)">🥩 肉類</button>
        <button class="tab-btn" onclick="switchTab('veggie',this)">🥬 蔬菜</button>
        <button class="tab-btn" onclick="switchTab('staple',this)">🍜 主食</button>
        <button class="tab-btn" onclick="switchTab('dessert',this)">🍮 甜品</button>
      </div>
      <div class="dishes-list" id="dishesList"></div>
    </div>
  </div>

  <div class="modal" id="recipeModal" onclick="if(event.target===this)closeModal()">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-header">
        <div class="modal-emoji" id="modalEmoji">🍽️</div>
        <h2 id="modalTitle">菜式名稱</h2>
        <div class="modal-tags" id="modalTags"></div>
      </div>
      <div class="modal-body">
        <div class="recipe-section"><h3>📝 食材</h3><div class="ingredients-list" id="modalIngredients"></div></div>
        <div class="recipe-section"><h3>👩‍🍳 做法</h3><div class="steps-list" id="modalSteps"></div></div>
        <div class="recipe-tip" id="modalTip"></div>
      </div>
      <button class="btn-add-plan" onclick="addToPlanFromModal()"><span>➕</span> 加入今日菜單</button>
    </div>
  </div>

  <div class="modal" id="shoppingModal" onclick="if(event.target===this)closeShoppingModal()">
    <div class="modal-content">
      <button class="modal-close" onclick="closeShoppingModal()">✕</button>
      <div class="modal-header">
        <div class="modal-emoji">🛒</div>
        <h2>買菜清單</h2>
        <p style="color:#a1887f;font-size:0.9rem">根據今日菜單自動生成</p>
      </div>
      <div class="shopping-list" id="shoppingList"></div>
      <button class="btn-copy" onclick="copyList()"><span>📋</span> 複製清單</button>
    </div>
  </div>

  <div class="footer"><p>今晚煮什麼</p></div>
</div>

<script src="app.js"></script>
</body>
</html>
